server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  # 签名密钥（生产环境建议通过环境变量覆盖）
  secret: todo-secret-key-for-jwt-signing-please-change-in-production-2024
  # token 有效期（毫秒），默认 24 小时
  expiration: 86400000
  # token 请求头名称
  header: Authorization
  # token 前缀
  prefix: "Bearer "

logging:
  level:
    com.example.todo: debug
